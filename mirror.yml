name: shellcheck
target:
  registry: ocx.sh
  repository: shellcheck

source:
  type: github_release
  owner: koalaman
  repo: shellcheck
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shellcheck-.*\\.linux\\.x86_64\\.tar\\.xz$"
  linux/arm64:
    - "shellcheck-.*\\.linux\\.aarch64\\.tar\\.xz$"
  darwin/amd64:
    - "shellcheck-.*\\.darwin\\.x86_64\\.tar\\.xz$"
  darwin/arm64:
    - "shellcheck-.*\\.darwin\\.aarch64\\.tar\\.xz$"
  windows/amd64:
    - "shellcheck-.*\\.zip$"

asset_type:
  type: archive
  strip_components:
    default: 1
    platforms:
      windows/amd64: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "0.11.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    # Intel slice tested on the arm64 macos-14 runner via Rosetta 2 (GitHub's
    # macos-13 Intel pool is exhausted and deadlocks the push job).
    runner: macos-14
    prefix: ["arch", "-x86_64"]
  darwin/arm64:
    runner: macos-14
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
    user_id: "227748867204972545"  # pinged in-message on failures
